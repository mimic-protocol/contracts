[package]
name = "settler"
version = "0.1.0"
description = "Manages on-chain intent settlement for Mimic protocol"
edition = "2021"
license = "GPL-3.0"

[lib]
crate-type = ["cdylib", "lib"]
name = "settler"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]
anchor-debug = []
custom-heap = []
custom-panic = []

[dependencies]
anchor-lang = { version = "0.32.1", features = [ "init-if-needed" ] }
anchor-spl = { version = "0.32.1" }
alloy-sol-types = "1.5.4"
alloy-primitives = "1.5.4"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(target_os, values("solana"))'] }
